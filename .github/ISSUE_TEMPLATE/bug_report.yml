name: Bug report
description: Report a problem with SiteDeck
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SiteDeck version
      description: Shown in the Settings tab (e.g. v0.3.3).
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots
      description: Anything else that helps. Do NOT include credentials or API keys.
