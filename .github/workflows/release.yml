name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Build the installer and publish it (plus the update metadata) to a GitHub Release.
      - run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # electron-builder occasionally races and publishes a second, blockmap-only
      # release for the same tag. Fold any stray release's assets back into the
      # canonical one and delete it. No-op when there's a single release.
      - name: Consolidate duplicate release
        shell: bash
        run: bash scripts/consolidate-release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
