<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SiteDeck</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span class="logo">▦</span> SiteDeck</div>
      <div class="controls">
        <label
          >기간
          <select id="period">
            <option value="7">7일</option>
            <option value="28" selected>28일</option>
            <option value="90">90일</option>
          </select>
        </label>
        <button id="refresh" type="button">새로고침</button>
      </div>
    </header>

    <main>
      <nav class="tabs">
        <button class="tab active" data-view="traffic" type="button">트래픽</button>
        <button class="tab" data-view="performance" type="button">성능</button>
      </nav>

      <section id="view-traffic">
        <div id="status" class="status" hidden></div>

        <table id="table" hidden>
          <thead>
            <tr>
              <th class="sortable" data-sort="name">사이트</th>
              <th class="sortable num" data-sort="activeUsers">활성 사용자</th>
              <th class="sortable num" data-sort="sessions">세션</th>
              <th class="sortable num" data-sort="keyEvents">핵심 이벤트</th>
              <th>탑 페이지</th>
              <th>탑 소스</th>
              <th>추세</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <div class="meta" id="meta"></div>
      </section>

      <section id="view-performance" hidden>
        <div class="controls">
          <button id="measure" type="button">지금 측정</button>
        </div>
        <div id="insights-status" class="status" hidden></div>
        <table id="insights-table" hidden>
          <thead>
            <tr>
              <th>사이트</th>
              <th class="num">성능</th>
              <th class="num">접근성</th>
              <th class="num">모범사례</th>
              <th class="num">SEO</th>
              <th>측정 시각</th>
              <th>추세</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="meta" id="insights-meta"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
