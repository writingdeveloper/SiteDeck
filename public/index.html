<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SiteDeck</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span class="logo">▦</span> SiteDeck</div>
      <div class="controls">
        <input id="search" type="search" class="search" data-i18n-placeholder="controls.searchPlaceholder" data-i18n-aria-label="controls.searchPlaceholder" />
        <label
          ><span data-i18n="controls.period">Period</span>
          <select id="period">
            <option value="7">7</option>
            <option value="28" selected>28</option>
            <option value="90">90</option>
          </select>
        </label>
        <label class="toggle"><input id="autorefresh" type="checkbox" /> <span data-i18n="controls.autoRefresh">Auto</span></label>
        <button id="refresh" type="button" data-i18n="btn.refresh">Refresh</button>
        <button id="export" type="button" data-i18n="btn.export">Export CSV</button>
      </div>
    </header>

    <main>
      <nav class="tabs" role="tablist">
        <button class="tab active" id="tab-traffic" role="tab" aria-selected="true" aria-controls="view-traffic" data-view="traffic" type="button" data-i18n="tab.traffic">Traffic</button>
        <button class="tab" id="tab-performance" role="tab" aria-selected="false" aria-controls="view-performance" data-view="performance" type="button" data-i18n="tab.performance">Performance</button>
        <button class="tab" id="tab-settings" role="tab" aria-selected="false" aria-controls="view-settings" data-view="settings" type="button" data-i18n="tab.settings">Settings</button>
      </nav>

      <section id="view-traffic" role="tabpanel" aria-labelledby="tab-traffic">
        <div id="status" class="status" role="status" aria-live="polite" hidden></div>
        <table id="table" hidden>
          <thead>
            <tr>
              <th class="sortable" data-sort="name" scope="col" tabindex="0" aria-sort="none" data-i18n="col.site">Site</th>
              <th class="sortable num" data-sort="activeUsers" scope="col" tabindex="0" aria-sort="none" data-i18n="col.activeUsers">Active users</th>
              <th class="sortable num" data-sort="sessions" scope="col" tabindex="0" aria-sort="none" data-i18n="col.sessions">Sessions</th>
              <th class="sortable num" data-sort="keyEvents" scope="col" tabindex="0" aria-sort="none" data-i18n="col.keyEvents">Key events</th>
              <th class="sortable num" data-sort="aiSessions" scope="col" tabindex="0" aria-sort="none" title="AI assistant referrals — ChatGPT, Perplexity, Gemini, Copilot…" data-i18n="col.aiTraffic">AI</th>
              <th scope="col" data-i18n="col.topPage">Top page</th>
              <th scope="col" data-i18n="col.topSource">Top channel</th>
              <th scope="col" data-i18n="col.trend">Trend</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="meta" id="meta"></div>
      </section>

      <section id="view-performance" role="tabpanel" aria-labelledby="tab-performance" hidden>
        <div class="controls">
          <button id="measure" type="button" data-i18n="btn.measureNow">Measure now</button>
        </div>
        <div id="insights-status" class="status" role="status" aria-live="polite" hidden></div>
        <table id="insights-table" hidden>
          <thead>
            <tr>
              <th scope="col" data-i18n="col.site">Site</th>
              <th class="num" scope="col" data-i18n="col.performance">Performance</th>
              <th class="num" scope="col" data-i18n="col.accessibility">Accessibility</th>
              <th class="num" scope="col" data-i18n="col.bestPractices">Best Practices</th>
              <th class="num" scope="col" data-i18n="col.seo">SEO</th>
              <th class="num" scope="col" title="Largest Contentful Paint" data-i18n="col.lcp">LCP</th>
              <th class="num" scope="col" title="Cumulative Layout Shift" data-i18n="col.cls">CLS</th>
              <th class="num" scope="col" title="Interaction to Next Paint" data-i18n="col.inp">INP</th>
              <th scope="col" data-i18n="col.measuredAt">Measured</th>
              <th scope="col" data-i18n="col.trend">Trend</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="meta" id="insights-meta"></div>
      </section>

      <section id="view-settings" role="tabpanel" aria-labelledby="tab-settings" hidden>
        <div class="settings">
          <div class="field setup">
            <span data-i18n="settings.setupTitle">Setup</span>
            <ul id="setup-steps" class="setup-steps"></ul>
          </div>

          <label class="field">
            <span data-i18n="settings.languageLabel">Language</span>
            <select id="lang-select">
              <option value="en">English</option>
              <option value="ko">한국어</option>
              <option value="es">Español</option>
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
            </select>
          </label>

          <label class="field">
            <span data-i18n="settings.themeLabel">Theme</span>
            <select id="theme-select">
              <option value="system" data-i18n="theme.system">System</option>
              <option value="dark" data-i18n="theme.dark">Dark</option>
              <option value="light" data-i18n="theme.light">Light</option>
            </select>
          </label>

          <label class="field">
            <span data-i18n="settings.psiKeyLabel">PageSpeed API key</span>
            <span class="field-row">
              <input id="psi-key" type="password" data-i18n-placeholder="settings.psiKeyPlaceholder" />
              <button id="psi-save" type="button" data-i18n="btn.save">Save</button>
            </span>
            <small id="psi-status" class="muted"></small>
          </label>

          <div class="field">
            <span data-i18n="settings.versionLabel">Version</span>
            <span class="field-row">
              <span id="version-current" class="muted"></span>
              <button id="check-update" type="button" data-i18n="settings.checkUpdate">Check for updates</button>
              <button id="update-restart" type="button" data-i18n="settings.restartApply" hidden>Restart to apply</button>
            </span>
            <small id="update-status" class="muted"></small>
          </div>

          <div class="field">
            <span data-i18n="settings.aboutLabel">About</span>
            <small class="muted" data-i18n="settings.description"></small>
            <span class="field-row">
              <a href="https://github.com/writingdeveloper/SiteDeck" data-i18n="link.github">GitHub</a>
              <a href="https://github.com/writingdeveloper/SiteDeck#readme" data-i18n="link.readme">README</a>
              <a href="https://github.com/writingdeveloper/SiteDeck/blob/main/LICENSE" data-i18n="link.license">License</a>
              <a href="https://github.com/writingdeveloper/SiteDeck/issues" data-i18n="link.issues">Issues</a>
            </span>
          </div>
        </div>
        <div id="settings-status" class="status" role="status" aria-live="polite" hidden></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
